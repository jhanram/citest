apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ci-app
  template:
    metadata:
      labels:
        app: ci-app
    spec:
      containers:
      - name: ci-app
        image: <your-dockerhub-username>/ci-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ci-app-service
spec:
  type: NodePort
  selector:
    app: ci-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
